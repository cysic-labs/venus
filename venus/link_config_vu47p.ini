# Venus FPGA link configuration (VU47P)
# Device: xcvu47p-fsvh2892-3-e
#
# This configuration maps current HLS test kernels to HBM banks so the
# packaged XO set can be linked into a single xclbin for bring-up.

[connectivity]
sp=gl64_test_kernel.a:HBM[0]
sp=gl64_test_kernel.b:HBM[1]
sp=gl64_test_kernel.result:HBM[2]

sp=ntt_test_kernel.data_in:HBM[3]
sp=ntt_test_kernel.data_out:HBM[4]
sp=ntt_test_kernel.twiddles:HBM[5]
sp=ntt_test_kernel.r_table:HBM[6]

sp=poseidon2_test_kernel.input:HBM[7]
sp=poseidon2_test_kernel.output:HBM[8]

sp=merkle_test_kernel.source:HBM[9]
sp=merkle_test_kernel.tree:HBM[10]
sp=merkle_test_kernel.proof:HBM[11]

sp=expr_test_kernel.trace:HBM[12]
sp=expr_test_kernel.constPols:HBM[13]
sp=expr_test_kernel.output:HBM[14]
sp=expr_test_kernel.ops_in:HBM[15]
sp=expr_test_kernel.args_in:HBM[16]
sp=expr_test_kernel.numbers_in:HBM[17]
sp=expr_test_kernel.challenges_in:HBM[18]
sp=expr_test_kernel.evals_in:HBM[19]
sp=expr_test_kernel.publicInputs_in:HBM[20]
sp=expr_test_kernel.airValues_in:HBM[21]
sp=expr_test_kernel.strides_in:HBM[22]

sp=fri_test_kernel.friPol:HBM[23]
sp=fri_test_kernel.output:HBM[24]
sp=fri_test_kernel.challenge_in:HBM[25]
sp=fri_test_kernel.queries:HBM[26]

sp=transcript_test_kernel.input:HBM[27]
sp=transcript_test_kernel.output:HBM[28]
sp=transcript_test_kernel.queries:HBM[29]

sp=proof_test_kernel.input_data:HBM[30]
sp=proof_test_kernel.friPol:HBM[0]
sp=proof_test_kernel.output:HBM[1]
sp=proof_test_kernel.challenge_out:HBM[2]
sp=proof_test_kernel.state_out:HBM[3]
sp=proof_test_kernel.tree_nodes:HBM[4]
